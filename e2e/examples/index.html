<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>Document</title>
    <style>
        body {
            background-color: #f0f0f0;
            color: #333;
            padding: 0;
            margin: 0;
            width: 100vw;
            height: 100vh;
        }

        #element-with-styles {
            width: 100px;
            height: 100px;
        }

        #non-visible-element {
            width: 100px;
            height: 100px;
            background-color: black;
            position: absolute;
            left: -200px;
        }

        #visible-element {
            width: 100px;
            height: 100px;
            background-color: gray;
            position: absolute;
            left: 200px;
        }

        #non-scrollable-element {
            width: 100px;
            height: 100px;
            background-color: blue;
            overflow: hidden;
        }

        #scrollable-element {
            width: 100px;
            height: 100px;
            background-color: green;
            overflow: scroll;
        }

        #non-focusable-element {
            width: 100px;
            height: 100px;
            background-color: yellow;
        }

        #focusable-element {
            width: 100px;
            height: 100px;
            background-color: orange;
        }

        #focusable-element:focus {
            border: 2px solid blue;
        }

        #test-hover {
            width: 100px;
            height: 100px;
            background-color: white;
        }

        #test-hover:hover {
            background-color: black;
        }

        #draggable {
            position: absolute;
            left: 200px;
            top: 200px;
            width: 100px;
            height: 100px;
            background-color: white;
            z-index: 10;
        }

        #draggable:focus {
            background-color: black;
        }

        #scrollable-container {
            position: absolute;
            left: 300px;
            top: 300px;
            width: 200px;
            height: 100px;
            background-color: white;
            overflow: scroll;
        }

        .wrapped-element {
            width: 100%;
            height: 45px;
            background-color: gray;
            margin: 5px;
        }

        #input-element:focus {
            border: 5px solid blue;
        }

        #input-area {
            width: 300px;
            height: 30px;
            border: 1px solid gray;
        }

        #input-area:focus {
            background-color: white;
            border: 5px solid blue;
        }

        #custom-event-element {
            width: 100px;
            height: 100px;
            background: gray;
        }

        .wait-for-visibility-wrapper {
            width: 300px;
            height: 50px;
            position: relative;
            display: flex;
        }

        .drop-zone {
            width: 200px;
            height: 200px;
            border: 10px solid black;
            position: relative;
            margin-top: 20px;
        }

        .draggable-item {
            width: 20px;
            height: 20px;
            background-color: red;
            position: absolute;
        }
    </style>
</head>

<body>
    <div id="container">
        Test content
    </div>
    <div id="element-with-text">
        <div>123</div>
    </div>
    <div id="element-with-children">
        <div class="child">123</div>
        <div class="child">456</div>
    </div>
    <div id="find-element">
        <span class="text">Text</span>
    </div>
    <div
        id="element-with-styles"
        style="background-color: red;"
    ></div>
    <div
        class="hidden-element"
        id="hidden-element-1"
        style="display: none;"
    ></div>
    <div
        class="hidden-element"
        id="hidden-element-2"
        style="opacity: 0"
    ></div>
    <div
        class="hidden-element"
        id="hidden-element-3"
        style="visibility:hidden"
    ></div>
    <div id="non-visible-element"></div>
    <div id="visible-element"></div>
    <div id="non-scrollable-element"></div>
    <div id="scrollable-element"></div>
    <div
        id="non-focusable-element"
        tabindex="1"
        disabled
    ></div>
    <div
        id="focusable-element"
        tabindex="1"
    ></div>
    <div id="click-test-element">Test click</div>
    <div id="dblclick-test-element">Test dblclick</div>
    <div id="test-hover">Hover me</div>
    <div id="draggable">Drag me</div>
    <div id="scrollable-container">
        <div class="wrapped-element">Text</div>
        <div class="wrapped-element">Text</div>
        <div class="wrapped-element">Text</div>
        <div class="wrapped-element">Text</div>
        <div class="wrapped-element">Text</div>
        <div class="wrapped-element">Text</div>
        <div class="wrapped-element">Text</div>
        <div class="wrapped-element">Text</div>
        <div id="inner-scrollable-element">Should scroll to me</div>
        <div class="wrapped-element">Text</div>
        <div class="wrapped-element">Text</div>
        <div class="wrapped-element">Text</div>
        <div class="wrapped-element">Text</div>
    </div>
    <input id="input-element" />
    <div
        id="input-area"
        tabindex="1"
    ></div>
    <div id="custom-event-element"></div>
    <div class="wait-for-visibility-wrapper">
        <button id="wait-for-visibility-false">Hide element</button>
        <button id="wait-for-visibility-true">Show element</button>
        <div id="wait-for-visiblity-assert-element">Wait for visibility element</div>
    </div>
    <div class="drop-zone">
        <div class="draggable-item"></div>
    </div>
    <script>
        document.getElementById('wait-for-visibility-false').addEventListener('click', (event) => {
            document.getElementById('wait-for-visiblity-assert-element').style.display = 'none';
        });
        document.getElementById('wait-for-visibility-true').addEventListener('click', (event) => {
            document.getElementById('wait-for-visiblity-assert-element').style.display = 'block';
        });
        document.getElementById('input-area').addEventListener('keydown', (event) => {
            // Handle backspace key
            if (event.keyCode === 8) {
                event.currentTarget.textContent = event.currentTarget.textContent.slice(0, -1);
                return;
            }
            event.currentTarget.textContent += event.key;
        });

        const customEventEl = document.getElementById('custom-event-element');
        customEventEl.addEventListener('custom-event-test', (event) => {
            const value = event.detail.value;
            event.currentTarget.textContent = value;
        });

        document.addEventListener('custom-event-test', (event) => {
            const value = event.detail.value;
            customEventEl.textContent = value;
        });

        const keys = ['altKey', 'ctrlKey', 'metaKey', 'shiftKey'];

        document.getElementById('click-test-element').addEventListener('click', (event) => {
            for (const key of keys) {
                if (event[key]) {
                    event.currentTarget.textContent = `Test click with ${key} pressed`;
                    return;
                }
            }

            event.currentTarget.textContent = 'Test click';
        });

        document.getElementById('click-test-element').addEventListener('mousedown', (event) => {
            if (event.button !== 2) return;
            for (const key of keys) {
                if (event[key]) {
                    event.currentTarget.textContent = `Test right click with ${key} pressed`;
                    return;
                }
            }

            event.currentTarget.textContent = 'Test right click';
        });

        document.getElementById('dblclick-test-element').addEventListener('dblclick', (event) => {
            for (const key of keys) {
                if (event[key]) {
                    event.currentTarget.textContent = `Test dblclick with ${key} pressed`;
                    return;
                }
            }

            event.currentTarget.textContent = 'Test dblclick';
        });

        let isDragging = false;
        let startX, startY;
        const draggableElement = document.getElementById('draggable')

        function moveElement(event) {
            if (isDragging) {
                const x = event.clientX - startX;
                const y = event.clientY - startY;
                draggableElement.style.left = `${x}px`;
                draggableElement.style.top = `${y}px`;
            }
        }

        function stopDragging() {
            isDragging = false;
            document.removeEventListener('mousemove', moveElement);
            document.removeEventListener('mouseup', stopDragging);
        }

        draggableElement.addEventListener('mousedown', (event) => {
            isDragging = true;
            startX = event.clientX - draggableElement.offsetLeft;
            startY = event.clientY - draggableElement.offsetTop;
            document.addEventListener('mousemove', moveElement);
            document.addEventListener('mouseup', stopDragging);
        });

        const draggableItem = document.querySelector('.draggable-item');
        const dropZone = document.querySelector('.drop-zone');

        draggableItem.addEventListener('mousedown', (event) => {
            const zoneRect = dropZone.getBoundingClientRect();
            const itemRect = draggableItem.getBoundingClientRect();

            const shiftX = event.clientX - itemRect.left;
            const shiftY = event.clientY - itemRect.top;

            const maxWidth = zoneRect.width - itemRect.width;
            const maxHeight = zoneRect.height - itemRect.height;
            const BORDER = 20;
            function onMouseMove(e) {
                let newLeft = e.clientX - zoneRect.left - 10 - shiftX;
                let newTop = e.clientY - zoneRect.top - 10 - shiftY;

                if (newLeft < 0) newLeft = 0;
                if (newLeft > maxWidth - BORDER) newLeft = maxWidth - BORDER;

                if (newTop < 0) newTop = 0;
                if (newTop > maxHeight - BORDER) newTop = maxHeight - BORDER;
                draggableItem.style.left = `${newLeft}px`;
                draggableItem.style.top = `${newTop}px`;
            }

            function onMouseUp() {
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            }

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        });
    </script>
</body>

</html>
