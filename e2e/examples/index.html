<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>Document</title>
    <style>
        body {
            background-color: #f0f0f0;
            color: #333;
            padding: 0;
            margin: 0;
            width: 100vw;
            height: 100vh;
        }

        #element-with-styles {
            width: 100px;
            height: 100px;
        }

        #non-visible-element {
            width: 100px;
            height: 100px;
            background-color: black;
            position: absolute;
            left: -200px;
        }

        #visible-element {
            width: 100px;
            height: 100px;
            background-color: gray;
            position: absolute;
            left: 200px;
        }

        #non-scrollable-element {
            width: 100px;
            height: 100px;
            background-color: blue;
            overflow: hidden;
        }

        #scrollable-element {
            width: 100px;
            height: 100px;
            background-color: green;
            overflow: scroll;
        }

        #non-focusable-element {
            width: 100px;
            height: 100px;
            background-color: yellow;
        }

        #focusable-element {
            width: 100px;
            height: 100px;
            background-color: orange;
        }

        #focusable-element:focus {
            border: 2px solid blue;
        }
    </style>
</head>

<body>
    <div id="container">
        Test content
    </div>
    <div id="element-with-text">
        <div>123</div>
    </div>
    <div id="element-with-children">
        <div class="child">123</div>
        <div class="child">456</div>
    </div>
    <div id="find-element">
        <span class="text">Text</span>
    </div>
    <div
        id="element-with-styles"
        style="background-color: red;"
    ></div>
    <div
        class="hidden-element"
        id="hidden-element-1"
        style="display: none;"
    ></div>
    <div
        class="hidden-element"
        id="hidden-element-2"
        style="opacity: 0"
    ></div>
    <div
        class="hidden-element"
        id="hidden-element-3"
        style="visibility:hidden"
    ></div>
    <div id="non-visible-element"></div>
    <div id="visible-element"></div>
    <div id="non-scrollable-element"></div>
    <div id="scrollable-element"></div>
    <div
        id="non-focusable-element"
        tabindex="1"
        disabled
    ></div>
    <div
        id="focusable-element"
        tabindex="1"
    ></div>
</body>

</html>
