<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gameface HTML Constructor Probe</title>
  <script>
(function () {
  var tags = ["a","abbr","acronym","address","area","article","aside","audio","b","base","bdi","bdo","big","blockquote","body","br","button","canvas","caption","center","cite","code","col","colgroup","data","datalist","dd","del","details","dfn","dialog","dir","div","dl","dt","em","embed","fencedframe","fieldset","figcaption","figure","font","footer","form","frame","frameset","h1","h2","h3","h4","h5","h6","head","header","hgroup","hr","html","i","iframe","img","input","ins","kbd","label","legend","li","link","main","map","mark","marquee","menu","meta","meter","nav","nobr","noembed","noframes","noscript","object","ol","optgroup","option","output","p","param","picture","plaintext","pre","progress","q","rb","rp","rt","rtc","ruby","s","samp","script","search","section","select","selectedcontent","slot","small","source","span","strike","strong","style","sub","summary","sup","table","tbody","td","template","textarea","tfoot","th","thead","time","title","tr","track","tt","u","ul","var","video","wbr","xmp"];
  var results = {};
  for (var i = 0; i < tags.length; i++) {
    var tag = tags[i];
    try {
      var el = document.createElement(tag);
      var ctorName = (el.constructor && el.constructor.name) || 'unknown';
      var tier = ctorName === 'HTMLUnknownElement' ? 'unknown'
               : ctorName === 'HTMLElement'        ? 'parsed-no-impl'
               :                                     'implemented';
      results[tag] = { tier: tier, constructorName: ctorName };
    } catch (e) {
      results[tag] = { tier: 'unknown', constructorName: 'error:' + String(e) };
    }
  }
  window.__htmlConstructorResults = results;
})();
  </script>
