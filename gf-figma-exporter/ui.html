<h2>Test Exporter</h2>
<form action="javascript:void(0);" class="input-area"></form>
<button id="create">Create</button>
<div>
    <button id="export-missing-fonts" style="display: none">Add Missing Fonts and Export</button>
    <button id="export-without-fonts" style="display: none">Continue without Fonts</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
    const form = document.querySelector('form');
    const exportButton = document.getElementById('create');
    const exportMissingFontsButton = document.getElementById('export-missing-fonts');
    const exportWithoutFontsButton = document.getElementById('export-without-fonts');

    exportButton.onclick = () => {
        parent.postMessage({ pluginMessage: { type: 'create-shapes' } }, '*');
    };

    onmessage = (event) => {
        const msg = event.data.pluginMessage;
        if (msg.type === 'download-files') {
            const pages = msg.data.pages;

            const jszip = new JSZip();
            for (const [name, { html, css, images, fonts }] of Object.entries(pages)) {
                jszip.file(`${name}/${name}.html`, html);
                jszip.file(`${name}/${name}.css`, css);

                if (images.length > 0) {
                    for (const image of images) {
                        jszip.file(`${name}/${image.name}`, image.data);
                    }
                }

                if (fonts && Object.keys(fonts).length > 0) {
                    for (const [font, fontWeights] of Object.entries(fonts)) {
                        for (const [weight, weightStyles] of Object.entries(fontWeights)) {
                            for (const [style, styleData] of Object.entries(weightStyles)) {
                                for (const [subset, data] of Object.entries(styleData.subsets)) {
                                    if (data) {
                                        jszip.file(`${name}/fonts/${font}-${style}_${weight}_${subset}.ttf`, data);
                                    }
                                }
                            }
                        }
                    }
                }
            }

            jszip.generateAsync({ type: 'blob' }).then((archive) => {
                const archiveUrl = URL.createObjectURL(archive);

                // Create download links and trigger the downloads
                const aZip = document.createElement('a');
                aZip.href = archiveUrl;
                aZip.download = msg.data.filename; // Default download filename for ZIP
                aZip.click();
                URL.revokeObjectURL(archiveUrl); // Clean up the URL object

                parent.postMessage({ pluginMessage: { type: 'close-plugin' } }, '*');
            });
        }

        if (msg.type === 'flatten-svg') {
            const { path, width, height, tolerance } = msg.data;
            const SVG_NS = 'http://www.w3.org/2000/svg';

            // Create the SVG
            const svg = document.createElementNS(SVG_NS, 'svg');
            svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
            svg.setAttribute('width', `${width}`);
            svg.setAttribute('height', `${height}`);

            // Create a path
            const pathElement = document.createElementNS(SVG_NS, 'path');
            pathElement.setAttribute('d', path);

            svg.appendChild(pathElement);

            // Calculate the total length of the path
            const totalLength = pathElement.getTotalLength();
            const points = [];

            // Sample points along the path based on the tolerance
            for (let length = 0; length <= totalLength; length += tolerance) {
                const point = pathElement.getPointAtLength(length);
                points.push({ x: point.x, y: point.y });
            }

            parent.postMessage({ pluginMessage: { type: 'flattened-svg-result', data: points } }, '*');
        }

        if (msg.type === 'path-bbox') {
            const { path } = msg.data;
            const SVG_NS = 'http://www.w3.org/2000/svg';

            // Create the SVG
            const svg = document.createElementNS(SVG_NS, 'svg');
            svg.style.position = 'absolute';
            svg.style.left = '-9999px';

            document.body.appendChild(svg);

            // Create a path
            const pathElement = document.createElementNS(SVG_NS, 'path');
            pathElement.setAttribute('d', path);

            svg.appendChild(pathElement);

            const bbox = pathElement.getBBox();

            document.body.removeChild(svg);

            parent.postMessage(
                {
                    pluginMessage: {
                        type: 'path-bbox-result',
                        data: {
                            x: Number(bbox.x),
                            y: Number(bbox.y),
                            width: Number(bbox.width),
                            height: Number(bbox.height),
                        },
                    },
                },
                '*'
            );
        }

        if (msg.type === 'MISSING_FONTS_DETECTED') {
            const { fonts } = msg.data;
            const h2 = document.createElement('h2');
            h2.textContent = 'Missing Fonts Detected. Please provide the font files below:';
            form.appendChild(h2);

            const table = document.createElement('table');
            const tableHead = document.createElement('thead');
            tableHead.innerHTML = `<tr><th>Font Family</th><th>Weight</th><th>Style</th><th>Subset</th><th>Provide Font Data</th></tr>`;
            const tableBody = document.createElement('tbody');

            table.appendChild(tableHead);
            table.appendChild(tableBody);
            form.appendChild(table);

            for (const [font] of Object.entries(fonts)) {
                for (const [weight] of Object.entries(fonts[font])) {
                    for (const [style] of Object.entries(fonts[font][weight])) {
                        for (const [subset] of Object.entries(fonts[font][weight][style].subsets)) {
                            const fontInput = document.createElement('input');
                            fontInput.type = 'file';
                            fontInput.accept = '.ttf,.ttc,.otf,.otc';

                            fontInput.name = `${font}_${weight}_${style}_${subset}`;

                            const row = document.createElement('tr');
                            row.innerHTML = `<td>${font}</td><td>${weight}</td><td>${style}</td><td>${subset}</td>`;
                            const inputCell = document.createElement('td');
                            inputCell.appendChild(fontInput);
                            row.appendChild(inputCell);
                            tableBody.appendChild(row);
                        }
                    }
                }
            }

            exportMissingFontsButton.style.display = 'block';
            exportWithoutFontsButton.style.display = 'block';
            exportButton.style.display = 'none';

            exportMissingFontsButton.onclick = () => {
                const inputs = form.querySelectorAll('input[type="file"]');
                inputs.forEach((input) => {
                    const file = input.files[0];

                    if (!file) {
                        alert('Please provide all missing font files before exporting.');
                        return;
                    }

                    const [fontFamily, weight, style, subset] = input.name.split('_');

                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const arrayBuffer = e.target.result;
                        if (arrayBuffer instanceof ArrayBuffer) {
                            fonts[fontFamily][weight][style].subsets[subset] = new Uint8Array(arrayBuffer);

                            // Check if all files are processed
                            const allProcessed = Array.from(inputs).every((inp) => inp.files.length > 0);
                            if (allProcessed) {
                                parent.postMessage(
                                    { pluginMessage: { type: 'MISSING_FONTS_RESPONSE', data: { fonts } } },
                                    '*'
                                );
                            }
                        }
                    };

                    reader.readAsArrayBuffer(file);
                });
            };

            exportWithoutFontsButton.onclick = () => {
                parent.postMessage({ pluginMessage: { type: 'MISSING_FONTS_RESPONSE', data: { fonts } } }, '*');
            };
        }
    };
</script>
