<h2>Test Exporter</h2>
<button id="create">Create</button>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
    document.getElementById('create').onclick = () => {
        parent.postMessage({ pluginMessage: { type: 'create-shapes' } }, '*');
    };

    onmessage = (event) => {
        const msg = event.data.pluginMessage;
        if (msg.type === 'download-files') {
            const pages = msg.pages;

            const jszip = new JSZip();
            for (const [name, { html, css, images }] of Object.entries(pages)) {
                jszip.file(`${name}/${name}.html`, html);
                jszip.file(`${name}/${name}.css`, css);

                if (images.length > 0) {
                    for (const image of images) {
                        jszip.file(`${name}/${image.name}`, image.data);
                    }
                }
            }

            jszip.generateAsync({ type: 'blob' }).then((archive) => {
                const archiveUrl = URL.createObjectURL(archive);

                // Create download links and trigger the downloads
                const aZip = document.createElement('a');
                aZip.href = archiveUrl;
                aZip.download = msg.filename; // Default download filename for ZIP
                aZip.click();
                URL.revokeObjectURL(archiveUrl); // Clean up the URL object

                parent.postMessage({ pluginMessage: { type: 'close-plugin' } }, '*');
            });
        }

        if (msg.type === 'flatten-svg') {
            const { path, width, height, tolerance } = msg.options;
            const SVG_NS = 'http://www.w3.org/2000/svg';

            // Create the SVG
            const svg = document.createElementNS(SVG_NS, 'svg');
            svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
            svg.setAttribute('width', `${width}`);
            svg.setAttribute('height', `${height}`);

            // Create a path 
            const pathElement = document.createElementNS(SVG_NS, 'path');
            pathElement.setAttribute('d', path);

            svg.appendChild(pathElement);

            // Calculate the total length of the path
            const totalLength = pathElement.getTotalLength();
            const points = [];

            // Sample points along the path based on the tolerance
            for (let length = 0; length <= totalLength; length += tolerance) {
                const point = pathElement.getPointAtLength(length);
                points.push({ x: point.x, y: point.y });
            }

            parent.postMessage({ pluginMessage: { type: 'flattened-svg-result', points } }, '*');
        }

        if (msg.type === 'path-bbox') {
            const { path } = msg.options;
            const SVG_NS = 'http://www.w3.org/2000/svg';

            // Create the SVG
            const svg = document.createElementNS(SVG_NS, 'svg');
            svg.style.position = 'absolute';
            svg.style.left = '-9999px';

            document.body.appendChild(svg);

            // Create a path
            const pathElement = document.createElementNS(SVG_NS, 'path');
            pathElement.setAttribute('d', path);

            svg.appendChild(pathElement);

            const bbox = pathElement.getBBox();

            document.body.removeChild(svg);

            parent.postMessage(
                {
                    pluginMessage: {
                        type: 'path-bbox-result',
                        bbox: {
                            x: Number(bbox.x),
                            y: Number(bbox.y),
                            width: Number(bbox.width),
                            height: Number(bbox.height),
                        },
                    },
                },
                '*'
            );
        }
    };
</script>
